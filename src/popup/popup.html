<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <title>Chuk Analyzer</title>
</head>
<body>
  <header>
    <div class="brand">
      <img src="../../icons/logo.svg" width="20" height="20" alt="">
      <span>Chuk Analyzer</span>
    </div>
    <div class="tools">
      <button id="rescan" title="Re-scan this page" aria-label="Re-scan">&#x21bb;</button>
      <div class="menu">
        <button id="exportBtn" title="Export" aria-label="Export">&#x2913;</button>
        <div class="menu-list" id="exportMenu" hidden>
          <button data-fmt="json">Export JSON</button>
          <button data-fmt="csv">Export CSV</button>
          <button data-fmt="copy">Copy to clipboard</button>
        </div>
      </div>
    </div>
  </header>

  <div id="summary" class="summary"></div>
  <main id="results"><div class="empty">Scanning&hellip;</div></main>
  <footer id="footer"></footer>

  <script src="popup.js"></script>
</body>
</html>
