<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <title>Chuk Analyzer</title>
</head>
<body>
  <header>
    <div class="brand">
      <img src="../../icons/logo.svg" width="20" height="20" alt="">
      <span>Chuk Analyzer</span>
    </div>
    <div class="tools">
      <button id="rescan" class="icon-btn" title="Re-scan this page" aria-label="Re-scan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <div class="menu">
        <button id="exportBtn" class="pill" title="Export results" aria-haspopup="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Export</span>
        </button>
        <div class="menu-list" id="exportMenu" hidden>
          <button data-fmt="json">Export as JSON</button>
          <button data-fmt="csv">Export as CSV</button>
          <button data-fmt="copy">Copy to clipboard</button>
        </div>
      </div>
    </div>
  </header>

  <div id="summary" class="summary"></div>
  <main id="results"><div class="empty">Scanning&hellip;</div></main>
  <footer id="footer"></footer>

  <script src="popup.js"></script>
</body>
</html>
